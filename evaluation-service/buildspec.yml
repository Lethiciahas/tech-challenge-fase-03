version: 0.2

env:
  parameter-store:
    GITHUB_TOKEN: /feature-flag/github-token

phases:
  install:
    runtime-versions:
      golang: 1.21
    commands:
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.56.2
      - curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b /usr/local/bin v2.19.0
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.1

  pre_build:
    commands:
      - cd evaluation-service
      - echo "--- Unit Tests ---"
      - go test -v -race ./...
      - echo "--- Linter ---"
      - golangci-lint run ./...
      - echo "--- SAST (gosec) ---"
      - gosec -severity high -confidence high ./...
      - echo "--- SCA (Trivy filesystem) ---"
      - trivy fs --exit-code 1 --severity CRITICAL --no-progress .
      - echo "--- ECR Login ---"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - echo "--- Docker Build ---"
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest
      - echo "--- Container Scan (Trivy) ---"
      - trivy image --exit-code 1 --severity CRITICAL --no-progress $ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - echo "--- Push to ECR ---"
      - docker push $ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:latest
      - echo "--- Update GitOps ---"
      - cd $CODEBUILD_SRC_DIR
      - sed -i "s|image:.*evaluation-service:.*|image: $ECR_REPO:$IMAGE_TAG|" gitops/base/evaluation-service.yaml
      - git config user.email "codebuild@ci.local"
      - git config user.name "CodeBuild"
      - git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git
      - git add gitops/base/evaluation-service.yaml
      - git commit -m "ci(evaluation-service): update image to $IMAGE_TAG" || true
      - git push origin main

artifacts:
  files:
    - gitops/base/evaluation-service.yaml

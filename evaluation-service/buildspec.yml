version: 0.2

phases:
  install:
    runtime-versions:
      golang: "1.21"
    commands:
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.56.2
      - curl -sfL https://raw.githubusercontent.com/securego/gosec/master/install.sh | sh -s -- -b /usr/local/bin v2.19.0
      - curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz | tar xzf - -C /usr/local/bin trivy

  pre_build:
    commands:
      - cd evaluation-service
      - echo "--- Unit Tests ---"
      - go test -v -race ./...
      - echo "--- Linter ---"
      - golangci-lint run ./...
      - echo "--- SAST (gosec) ---"
      - gosec -severity high -confidence high ./...
      - echo "--- SCA (Trivy filesystem) ---"
      - trivy fs --exit-code 1 --severity CRITICAL --no-progress .
      - echo "--- ECR Login ---"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/evaluation-service
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:=latest}
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest
      - trivy image --exit-code 1 --severity CRITICAL --no-progress $ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:=latest}
      - export FULL_IMAGE="$ECR_REPO:$IMAGE_TAG"
      - docker push $ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:latest
      - GITHUB_TOKEN=$(aws ssm get-parameter --name /feature-flag/github-token --with-decryption --query Parameter.Value --output text)
      - git clone https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git /tmp/gitops-repo
      - cd /tmp/gitops-repo
      - 'sed -i "s@image: .*feature-flag-evaluation-service:.*@image: ${FULL_IMAGE}@" gitops/base/evaluation-service.yaml'
      - git config user.email "codebuild@ci.local"
      - git config user.name "CodeBuild"
      - git add gitops/base/evaluation-service.yaml
      - 'git commit -m "ci: evaluation-service image ${IMAGE_TAG}" || true'
      - git push origin main || true

artifacts:
  files:
    - "**/*"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  labels:
    app: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: evaluation-service
        image: 964177143569.dkr.ecr.us-east-1.amazonaws.com/evaluation-service:latest
        ports:
        - containerPort: 8004
        env:
        - name: PORT
          value: "8004"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_URL
        - name: FLAG_SERVICE_URL
          value: "http://flag-service:8002"
        - name: TARGETING_SERVICE_URL
          value: "http://targeting-service:8003"
        - name: SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SERVICE_API_KEY
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: AWS_REGION
        - name: AWS_SQS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: AWS_SQS_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
spec:
  type: NodePort
  selector:
    app: evaluation-service
  ports:
  - port: 8004
    targetPort: 8004
    nodePort: 30004

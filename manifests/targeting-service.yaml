apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  labels:
    app: targeting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: targeting-service
        image: 964177143569.dkr.ecr.us-east-1.amazonaws.com/feature-flag-targeting-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: PORT
          value: "8003"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: TARGETING_DATABASE_URL
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8001"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: targeting-service
spec:
  type: NodePort
  selector:
    app: targeting-service
  ports:
  - port: 8003
    targetPort: 8003
    nodePort: 30003

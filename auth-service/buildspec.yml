version: 0.2

phases:
  install:
    runtime-versions:
      golang: "1.21"
    commands:
      - curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v1.56.2
      - curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz | tar xzf - -C /usr/local/bin trivy

  pre_build:
    commands:
      - cd auth-service
      - go test -v -race ./...
      - golangci-lint run ./... || true
      - trivy fs --severity CRITICAL --no-progress . || true
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/auth-service
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:=latest}
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest
      - trivy image --severity CRITICAL --no-progress $ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:=latest}
      - export FULL_IMAGE=$ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:latest
      - export GITHUB_TOKEN=$(aws ssm get-parameter --name /feature-flag/github-token --with-decryption --query Parameter.Value --output text)
      - git clone https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPO.git /tmp/gitops-repo
      - cd /tmp/gitops-repo
      - sed -i "s@image:.*feature-flag-auth-service:.*@image:\ $FULL_IMAGE@" gitops/base/auth-service.yaml || true
      - git config user.email codebuild@ci.local
      - git config user.name CodeBuild
      - git add -A
      - git diff --cached --quiet || git commit -m "ci auth-service $IMAGE_TAG"
      - git push origin main || true

artifacts:
  files:
    - "**/*"

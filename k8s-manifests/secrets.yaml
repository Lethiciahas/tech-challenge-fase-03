apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: feature-flag-dev
type: Opaque
stringData:
  AWS_REGION: "<aws-region>"
  AWS_ACCOUNT_ID: "<aws-account-id>"
  AUTH_DATABASE_URL: "postgresql://dbadmin:<password>@<rds-auth-endpoint>:5432/authdb"
  FLAG_DATABASE_URL: "postgresql://dbadmin:<password>@<rds-flag-endpoint>:5432/flagdb"
  TARGETING_DATABASE_URL: "postgresql://dbadmin:<password>@<rds-targeting-endpoint>:5432/targetingdb"
  REDIS_URL: "redis://<elasticache-endpoint>:6379"
  MASTER_KEY: "<master-key>"
  JWT_SECRET: "<jwt-secret>"
  SERVICE_API_KEY: "<service-api-key>"
  AWS_SQS_URL: "<sqs-queue-url>"
  AWS_DYNAMODB_TABLE: "<dynamodb-table-name>"
---
apiVersion: v1
kind: Secret
metadata:
  name: ecr-secret
  namespace: feature-flag-dev
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: <base64-encoded-docker-config>
---
apiVersion: v1
kind: Secret
metadata:
  name: keda-aws-secrets
  namespace: feature-flag-dev
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "<access-key-id>"
  AWS_SECRET_ACCESS_KEY: "<secret-access-key>"
  AWS_SESSION_TOKEN: "<session-token>"

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: feature-flag-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/owner/feature-flag.git
    targetRevision: main
    path: gitops/base
  destination:
    server: https://kubernetes.default.svc
    namespace: feature-flag-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

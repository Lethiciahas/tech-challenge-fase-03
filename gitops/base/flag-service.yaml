apiVersion: apps/v1
kind: Deployment
metadata:
  name: flag-service
  namespace: feature-flag-dev
  labels:
    app: flag-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flag-service
  template:
    metadata:
      labels:
        app: flag-service
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: flag-service
        image: 964177143569.dkr.ecr.us-east-1.amazonaws.com/feature-flag-flag-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: PORT
          value: "8002"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: FLAG_DATABASE_URL
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: flag-service
  namespace: feature-flag-dev
spec:
  type: ClusterIP
  selector:
    app: flag-service
  ports:
  - port: 8002
    targetPort: 8002

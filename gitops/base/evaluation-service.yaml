apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
  namespace: feature-flag-dev
  labels:
    app: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evaluation-service
  template:
    metadata:
      labels:
        app: evaluation-service
    spec:
      imagePullSecrets:
      - name: ecr-secret
      containers:
      - name: evaluation-service
        image: 964177143569.dkr.ecr.us-east-1.amazonaws.com/feature-flag-evaluation-service:latest
        ports:
        - containerPort: 8004
        env:
        - name: PORT
          value: "8004"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: REDIS_URL
        - name: SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: SERVICE_API_KEY
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: AWS_REGION
        - name: AWS_SQS_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: AWS_SQS_URL
        envFrom:
        - configMapRef:
            name: app-config
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: evaluation-service
  namespace: feature-flag-dev
spec:
  type: ClusterIP
  selector:
    app: evaluation-service
  ports:
  - port: 8004
    targetPort: 8004

version: 0.2

phases:
  install:
    runtime-versions:
      python: "3.11"
    commands:
      - pip install flake8 bandit pytest
      - curl -sfL https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz | tar xzf - -C /usr/local/bin trivy

  pre_build:
    commands:
      - cd flag-service
      - pip install -r requirements.txt
      - pytest test_app.py -v || true
      - flake8 app.py --max-line-length=120 --ignore=E501,W503,E302,E303,W291,W292,W293,E261,E262,E265,E266,E402 || true
      - bandit -r app.py -ll -ii || true
      - trivy fs --exit-code 1 --severity CRITICAL --no-progress .
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - cd $CODEBUILD_SRC_DIR/flag-service
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:=latest}
      - docker build -t $ECR_REPO:$IMAGE_TAG .
      - docker tag $ECR_REPO:$IMAGE_TAG $ECR_REPO:latest
      - trivy image --exit-code 1 --severity CRITICAL --no-progress $ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - export COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - export IMAGE_TAG=${COMMIT_HASH:=latest}
      - docker push $ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:latest
      - cd $CODEBUILD_SRC_DIR/flag-service
      - chmod +x update-gitops.sh
      - ./update-gitops.sh || true

artifacts:
  files:
    - "**/*"
